<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Własność gruntów – Poznań</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }

    #map { width: 100%; height: 60vh; min-height: 300px; }

    #panel {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    #card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #card.loading { color: #888; font-size: 14px; }
    #card.error   { color: #e53e3e; font-size: 14px; }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 2px;
    }
    .value {
      font-size: 15px;
      color: #1a1a2e;
      line-height: 1.4;
    }
    .value.big {
      font-size: 18px;
      font-weight: 700;
      color: #2b6cb0;
    }

    .hint {
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    .parcel-label {
      background: white;
      border: none !important;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 600;
      color: #1a56a0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .parcel-label::before { display: none; }

    .tap-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 1000;
    }

    #map-wrap { position: relative; }
  </style>
</head>
<body>

<div id="map-wrap">
  <div id="map"></div>
  <div class="tap-hint" id="tap-hint">Dotknij mapę, aby sprawdzić działkę</div>
</div>

<div id="panel">
  <h1>Własność gruntów</h1>
  <p class="subtitle">Dane ewidencyjne GEOPOZ Poznań</p>
  <div id="card">
    <span class="hint">Dotknij dowolnego miejsca na mapie</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', { zoomControl: true, doubleClickZoom: true }).setView([52.4064, 16.9252], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 20
  }).addTo(map);

  // Warstwa obrysów działek z GEOPOZ (WMS, półprzezroczysta)
  L.tileLayer.wms('https://wms2.geopoz.poznan.pl/geoserver/egib/ows', {
    layers: 'dzialki_szraw_sql',
    format: 'image/png',
    transparent: true,
    opacity: 0.45,
    maxZoom: 20,
    attribution: 'Ewidencja gruntów © GEOPOZ Poznań'
  }).addTo(map);

  // Geolokalizacja przy starcie
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        map.setView([lat, lng], 16);
      },
      function() {
        // Brak zgody lub błąd — zostaje domyślny widok Poznania
      },
      { timeout: 5000 }
    );
  }

  let marker = null;
  let parcelLayer = null;
  const card = document.getElementById('card');
  const tapHint = document.getElementById('tap-hint');

  let requestToken = 0;

  // Rozróżnienie single tap od double tap
  let clickTimer = null;

  map.on('click', async function(e) {
    if (clickTimer) {
      // Drugi klik przyszedł szybko — to double click, anuluj single
      clearTimeout(clickTimer);
      clickTimer = null;
      return;
    }
    clickTimer = setTimeout(async function() {
      clickTimer = null;
      await handleSingleClick(e);
    }, 250);
  });

  map.on('dblclick', function(e) {
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
    }
    map.zoomIn();
  });

  async function handleSingleClick(e) {
    const { lat, lng } = e.latlng;
    const myToken = ++requestToken;

    if (parcelLayer) { parcelLayer.remove(); parcelLayer = null; }
    if (marker) { marker.remove(); marker = null; }

    tapHint.style.display = 'none';
    card.className = 'loading';
    card.innerHTML = 'Pobieranie danych\u2026';

    try {
      const res = await fetch('/dzialka?lat=' + lat + '&lon=' + lng);
      if (myToken !== requestToken) return;
      const d = await res.json();

      if (d.error) {
        card.className = 'error';
        card.innerHTML = d.error;
        return;
      }

      if (d.geometry) {
        parcelLayer = L.geoJSON({ type: 'Feature', geometry: d.geometry }, {
          style: { color: '#000000', weight: 3, fillColor: '#3b82f6', fillOpacity: 0.35 }
        }).addTo(map);
        const center = parcelLayer.getBounds().getCenter();
        L.tooltip({ permanent: true, direction: 'center', className: 'parcel-label' })
          .setContent(d.ozn_dz)
          .setLatLng(center)
          .addTo(parcelLayer);
      } else {
        marker = L.circleMarker([lat, lng], {
          radius: 8, color: '#2b6cb0', fillColor: '#4299e1',
          fillOpacity: 0.9, weight: 2
        }).addTo(map);
      }

      const bazaInfo = d.baza_data
        ? '<div style="text-align:right;font-size:11px;color:#bbb;margin-top:12px">Baza powierze\u0144: ' + d.baza_data + ' (' + d.baza_liczba + ' rekord\u00f3w)</div>'
        : '';

      card.className = '';
      card.innerHTML =
        '<div style="width:100%">' +
        field('Numer dzia\u0142ki', d.ozn_dz, true) +
        field('W\u0142a\u015bciciel', d.wlasc) +
        field('Zarz\u0105dca', d.pow_opis === 'brak informacji' && d.wlad === 'Wykonywanie zada\u0144 zarz\u0105dcy dr\u00f3g publicznych'
          ? 'Prawdopodobnie Zarz\u0105d Dr\u00f3g Miejskich <span style="color:#555;font-size:12px">(brak informacji w danych GEOPOZu)</span>'
          : d.pow_opis) +
        (d.pow_syg ? field('Sygnatura powierzenia', d.pow_syg) : '') +
        field('Rodzaj zarz\u0105dzania', d.wlad) +
        field('Powierzchnia', d.pow_ewd ? d.pow_ewd + ' ha' : '\u2014') +
        bazaInfo +
        '</div>';

    } catch(err) {
      if (myToken !== requestToken) return;
      card.className = 'error';
      card.innerHTML = 'B\u0142\u0105d po\u0142\u0105czenia. Spr\u00f3buj ponownie.';
    }
  }

  function field(label, value, big) {
    if (!value || value === '\u2014' || value === 'null') return '';
    return '<div class="field">' +
      '<div class="label">' + label + '</div>' +
      '<div class="value' + (big ? ' big' : '') + '">' + value + '</div>' +
      '</div>';
  }
</script>
</body>
</html>
